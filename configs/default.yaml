# Default configuration for the Slow Momentum with Fast Reversion pipeline.
# Values mirror the hyperparameters used in Wood, Roberts & Zohren (2022).

# --- Data paths ---
data:
  raw_excel: data/raw/stoxx600/2025_2026_PRICE_ATLAS_data_sxxr_static.xlsx
  processed_dir: data/processed/stoxx600
  stocks_csv: data/processed/stoxx600/stoxx600_processed.csv
  benchmarks_csv: data/processed/stoxx600/benchmark_stoxx600_ew.csv

# --- Universe ---
assets: []

# --- Changepoint detection ---
lbw: 21

# --- Return features (per-ticker, computed in src/features.py) ---
# Each entry: [lag_in_days, label]. Used for both log and arithmetic returns.
return_horizons:
  - [1, "1d"]
  - [20, "20d"]
  - [252, "252d"]

# --- Realized volatility windows (annualized, from 1d log returns) ---
vol_windows:
  - [20, "20d"]
  - [60, "60d"]
  - [252, "252d"]

# --- MACD (paper Sec. 4) ---
macd_pairs:
  - [8, 24]
  - [16, 28]
  - [32, 96]

# --- Portfolio / signal ---
vol_target: 0.15
ewm_span: 60
